# PerPlayerKit Language File - French (Français)
# Uses MiniMessage format: https://docs.advntr.dev/minimessage/format.html
# Placeholders use {name} syntax (e.g. {player}, {slot}).
# To use this file, set `language: fr` in config.yml.

prefix: "<gray>[<aqua>Kits</aqua>]</gray> "

motd:
  message:
    - ""
    - "<gray>   <st>                </st> <aqua><b>Kits Par Joueur</b><gray> <st>                </st>"
    - ""
    - "         <white>Tapez <aqua>/kit<white>, <aqua>/k <white>ou <aqua>/pk<white> pour commencer !"
    - ""
    - "<gray>   <st>                                                         "
    - ""

scheduled-broadcast:
  messages:
    - "<white>Découvrez les kits publics avec la commande <aqua>/pk<white> !"
    - "<white>Vous voulez partager un kit ? Utilisez <aqua>/sharekit \\<slot></aqua><white>."
    - "<white>Tapez <aqua>/kit<white>, <aqua>/k <white>ou <aqua>/pk<white> pour commencer !"

broadcast-messages:
  player-repaired: "<gray>{player} a réparé son équipement</gray>"
  player-healed: "<gray>{player} s'est soigné</gray>"
  player-opened-kit-room: "<gray>{player} a ouvert la Salle des Kits</gray>"
  player-loaded-private-kit: "<gray>{player} a chargé un kit</gray>"
  player-loaded-public-kit: "<gray>{player} a chargé un kit public</gray>"
  player-loaded-enderchest: "<gray>{player} a chargé un ender chest.</gray>"
  player-copied-kit: "<gray>{player} a copié un kit</gray>"
  player-copied-ec: "<gray>{player} a copié un ender chest</gray>"
  player-regeared: "<gray>{player} s'est rééquipé</gray>"
  generic: "<gray><aqua>{player}</aqua> a effectué une action.</gray>"

