# PerPlayerKit Language File - Ukrainian (Українська)
# Uses MiniMessage format: https://docs.advntr.dev/minimessage/format.html
# Placeholders use {name} syntax (e.g. {player}, {slot}).
# To use this file, set `language: uk` in config.yml.

prefix: "<gray>[<aqua>Кіти</aqua>]</gray> "

motd:
  message:
    - ""
    - "<gray>   <st>                </st> <aqua><b>Особисті набори</b><gray> <st>                </st>"
    - ""
    - "         <white>Введіть <aqua>/kit<white>, <aqua>/k <white>або <aqua>/pk<white> щоб почати!"
    - ""
    - "<gray>   <st>                                                         "
    - ""

scheduled-broadcast:
  messages:
    - "<white>Перегляньте публічні набори командою <aqua>/pk<white>!"
    - "<white>Хочете поділитися набором? Використайте <aqua>/sharekit \\<slot></aqua><white>."
    - "<white>Введіть <aqua>/kit<white>, <aqua>/k <white>або <aqua>/pk<white> щоб почати!"

broadcast-messages:
  player-repaired: "<gray>{player} полагодив спорядження</gray>"
  player-healed: "<gray>{player} вилікувався</gray>"
  player-opened-kit-room: "<gray>{player} відкрив кімнату наборів</gray>"
  player-loaded-private-kit: "<gray>{player} завантажив набір</gray>"
  player-loaded-public-kit: "<gray>{player} завантажив публічний набір</gray>"
  player-loaded-enderchest: "<gray>{player} завантажив ендер-скриню.</gray>"
  player-copied-kit: "<gray>{player} скопіював набір</gray>"
  player-copied-ec: "<gray>{player} скопіював ендер-скриню</gray>"
  player-regeared: "<gray>{player} переекіпірувався</gray>"
  generic: "<gray><aqua>{player}</aqua> виконав дію.</gray>"

