# PerPlayerKit Language File - Finnish (Suomi)
# Uses MiniMessage format: https://docs.advntr.dev/minimessage/format.html
# Placeholders use {name} syntax (e.g. {player}, {slot}).
# To use this file, set `language: fi` in config.yml.

prefix: "<gray>[<aqua>Kitit</aqua>]</gray> "

motd:
  message:
    - ""
    - "<gray>   <st>                </st> <aqua><b>Pelaajakohtaiset Kitit</b><gray> <st>                </st>"
    - ""
    - "         <white>Kirjoita <aqua>/kit<white>, <aqua>/k <white>tai <aqua>/pk<white> aloittaaksesi!"
    - ""
    - "<gray>   <st>                                                         "
    - ""

scheduled-broadcast:
  messages:
    - "<white>Katso julkiset kitit komennolla <aqua>/pk<white>!"
    - "<white>Haluatko jakaa kitin? Käytä <aqua>/sharekit \\<slot></aqua><white>."
    - "<white>Kirjoita <aqua>/kit<white>, <aqua>/k <white>tai <aqua>/pk<white> aloittaaksesi!"

broadcast-messages:
  player-repaired: "<gray>{player} korjasi varusteensa</gray>"
  player-healed: "<gray>{player} paransi itsensä</gray>"
  player-opened-kit-room: "<gray>{player} avasi kittihuoneen</gray>"
  player-loaded-private-kit: "<gray>{player} latasi kitin</gray>"
  player-loaded-public-kit: "<gray>{player} latasi julkisen kitin</gray>"
  player-loaded-enderchest: "<gray>{player} latasi ender-arkun.</gray>"
  player-copied-kit: "<gray>{player} kopioi kitin</gray>"
  player-copied-ec: "<gray>{player} kopioi ender-arkun</gray>"
  player-regeared: "<gray>{player} varusti itsensä uudelleen</gray>"
  generic: "<gray><aqua>{player}</aqua> suoritti toiminnon.</gray>"

