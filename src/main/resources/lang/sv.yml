# PerPlayerKit Language File - Swedish (Svenska)
# Uses MiniMessage format: https://docs.advntr.dev/minimessage/format.html
# Placeholders use {name} syntax (e.g. {player}, {slot}).
# To use this file, set `language: sv` in config.yml.

prefix: "<gray>[<aqua>Kit</aqua>]</gray> "

motd:
  message:
    - ""
    - "<gray>   <st>                </st> <aqua><b>Per Spelare Kit</b><gray> <st>                </st>"
    - ""
    - "         <white>Skriv <aqua>/kit<white>, <aqua>/k <white>eller <aqua>/pk<white> för att börja!"
    - ""
    - "<gray>   <st>                                                         "
    - ""

scheduled-broadcast:
  messages:
    - "<white>Kolla in publika kit med kommandot <aqua>/pk<white>!"
    - "<white>Vill du dela ett kit? Använd <aqua>/sharekit \\<slot></aqua><white>."
    - "<white>Skriv <aqua>/kit<white>, <aqua>/k <white>eller <aqua>/pk<white> för att börja!"

broadcast-messages:
  player-repaired: "<gray>{player} reparerade sin utrustning</gray>"
  player-healed: "<gray>{player} läkte sig själv</gray>"
  player-opened-kit-room: "<gray>{player} öppnade kitrummet</gray>"
  player-loaded-private-kit: "<gray>{player} laddade ett kit</gray>"
  player-loaded-public-kit: "<gray>{player} laddade ett publikt kit</gray>"
  player-loaded-enderchest: "<gray>{player} laddade en enderkista.</gray>"
  player-copied-kit: "<gray>{player} kopierade ett kit</gray>"
  player-copied-ec: "<gray>{player} kopierade en enderkista</gray>"
  player-regeared: "<gray>{player} utrustade om sig</gray>"
  generic: "<gray><aqua>{player}</aqua> utförde en handling.</gray>"

