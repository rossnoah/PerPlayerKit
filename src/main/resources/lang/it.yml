# PerPlayerKit Language File - Italian (Italiano)
# Uses MiniMessage format: https://docs.advntr.dev/minimessage/format.html
# Placeholders use {name} syntax (e.g. {player}, {slot}).
# To use this file, set `language: it` in config.yml.

prefix: "<gray>[<aqua>Kit</aqua>]</gray> "

motd:
  message:
    - ""
    - "<gray>   <st>                </st> <aqua><b>Kit Per Giocatore</b><gray> <st>                </st>"
    - ""
    - "         <white>Digita <aqua>/kit<white>, <aqua>/k <white>o <aqua>/pk<white> per iniziare!"
    - ""
    - "<gray>   <st>                                                         "
    - ""

scheduled-broadcast:
  messages:
    - "<white>Controlla i kit pubblici con il comando <aqua>/pk<white>!"
    - "<white>Vuoi condividere un kit? Usa <aqua>/sharekit \\<slot></aqua><white>."
    - "<white>Digita <aqua>/kit<white>, <aqua>/k <white>o <aqua>/pk<white> per iniziare!"

broadcast-messages:
  player-repaired: "<gray>{player} ha riparato il proprio equipaggiamento</gray>"
  player-healed: "<gray>{player} si è curato</gray>"
  player-opened-kit-room: "<gray>{player} ha aperto la stanza dei kit</gray>"
  player-loaded-private-kit: "<gray>{player} ha caricato un kit</gray>"
  player-loaded-public-kit: "<gray>{player} ha caricato un kit pubblico</gray>"
  player-loaded-enderchest: "<gray>{player} ha caricato un baule di Ender.</gray>"
  player-copied-kit: "<gray>{player} ha copiato un kit</gray>"
  player-copied-ec: "<gray>{player} ha copiato un baule di Ender</gray>"
  player-regeared: "<gray>{player} si è riequipaggiato</gray>"
  generic: "<gray><aqua>{player}</aqua> ha eseguito un'azione.</gray>"

