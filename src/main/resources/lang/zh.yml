# PerPlayerKit Language File - Chinese (简体中文)
# Uses MiniMessage format: https://docs.advntr.dev/minimessage/format.html
# Placeholders use {name} syntax (e.g. {player}, {slot}).
# To use this file, set `language: zh` in config.yml.

prefix: "<gray>[<aqua>套件</aqua>]</gray> "

motd:
  message:
    - ""
    - "<gray>   <st>                </st> <aqua><b>玩家专属套件</b><gray> <st>                </st>"
    - ""
    - "         <white>输入 <aqua>/kit<white>、<aqua>/k <white>或 <aqua>/pk<white> 开始使用!"
    - ""
    - "<gray>   <st>                                                         "
    - ""

scheduled-broadcast:
  messages:
    - "<white>使用 <aqua>/pk<white> 命令查看公共套件!"
    - "<white>想要分享套件? 使用 <aqua>/sharekit \\<slot></aqua><white> 命令。"
    - "<white>输入 <aqua>/kit<white>、<aqua>/k <white>或 <aqua>/pk<white> 开始使用!"

broadcast-messages:
  player-repaired: "<gray>{player} 修理了装备</gray>"
  player-healed: "<gray>{player} 治疗了自己</gray>"
  player-opened-kit-room: "<gray>{player} 打开了套件房间</gray>"
  player-loaded-private-kit: "<gray>{player} 加载了一个套件</gray>"
  player-loaded-public-kit: "<gray>{player} 加载了一个公共套件</gray>"
  player-loaded-enderchest: "<gray>{player} 加载了末影箱。</gray>"
  player-copied-kit: "<gray>{player} 复制了一个套件</gray>"
  player-copied-ec: "<gray>{player} 复制了一个末影箱</gray>"
  player-regeared: "<gray>{player} 重新装备</gray>"
  generic: "<gray><aqua>{player}</aqua> 执行了一个操作。</gray>"

