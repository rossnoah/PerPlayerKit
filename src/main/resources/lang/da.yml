# PerPlayerKit Language File - Danish (Dansk)
# Uses MiniMessage format: https://docs.advntr.dev/minimessage/format.html
# Placeholders use {name} syntax (e.g. {player}, {slot}).
# To use this file, set `language: da` in config.yml.

prefix: "<gray>[<aqua>Kits</aqua>]</gray> "

motd:
  message:
    - ""
    - "<gray>   <st>                </st> <aqua><b>Per Spiller Kits</b><gray> <st>                </st>"
    - ""
    - "         <white>Skriv <aqua>/kit<white>, <aqua>/k <white>eller <aqua>/pk<white> for at komme i gang!"
    - ""
    - "<gray>   <st>                                                         "
    - ""

scheduled-broadcast:
  messages:
    - "<white>Tjek offentlige kits med <aqua>/pk<white>-kommandoen!"
    - "<white>Vil du dele et kit? Brug <aqua>/sharekit \\<slot></aqua><white>."
    - "<white>Skriv <aqua>/kit<white>, <aqua>/k <white>eller <aqua>/pk<white> for at komme i gang!"

broadcast-messages:
  player-repaired: "<gray>{player} reparerede sit udstyr</gray>"
  player-healed: "<gray>{player} helede sig selv</gray>"
  player-opened-kit-room: "<gray>{player} åbnede kitrummet</gray>"
  player-loaded-private-kit: "<gray>{player} indlæste et kit</gray>"
  player-loaded-public-kit: "<gray>{player} indlæste et offentligt kit</gray>"
  player-loaded-enderchest: "<gray>{player} indlæste en enderkiste.</gray>"
  player-copied-kit: "<gray>{player} kopierede et kit</gray>"
  player-copied-ec: "<gray>{player} kopierede en enderkiste</gray>"
  player-regeared: "<gray>{player} udrustede sig igen</gray>"
  generic: "<gray><aqua>{player}</aqua> udførte en handling.</gray>"

