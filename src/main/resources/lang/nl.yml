# PerPlayerKit Language File - Dutch (Nederlands)
# Uses MiniMessage format: https://docs.advntr.dev/minimessage/format.html
# Placeholders use {name} syntax (e.g. {player}, {slot}).
# To use this file, set `language: nl` in config.yml.

prefix: "<gray>[<aqua>Kits</aqua>]</gray> "

motd:
  message:
    - ""
    - "<gray>   <st>                </st> <aqua><b>Per Speler Kits</b><gray> <st>                </st>"
    - ""
    - "         <white>Typ <aqua>/kit<white>, <aqua>/k <white>of <aqua>/pk<white> om te beginnen!"
    - ""
    - "<gray>   <st>                                                         "
    - ""

scheduled-broadcast:
  messages:
    - "<white>Bekijk openbare kits met het commando <aqua>/pk<white>!"
    - "<white>Wil je een kit delen? Gebruik <aqua>/sharekit \\<slot></aqua><white>."
    - "<white>Typ <aqua>/kit<white>, <aqua>/k <white>of <aqua>/pk<white> om te beginnen!"

broadcast-messages:
  player-repaired: "<gray>{player} heeft zijn uitrusting gerepareerd</gray>"
