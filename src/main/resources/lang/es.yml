# PerPlayerKit Language File - Spanish (Español)
# Uses MiniMessage format: https://docs.advntr.dev/minimessage/format.html
# Placeholders use {name} syntax (e.g. {player}, {slot}).
# To use this file, set `language: es` in config.yml.

prefix: "<gray>[<aqua>Kits</aqua>]</gray> "

motd:
  message:
    - ""
    - "<gray>   <st>                </st> <aqua><b>Kits Por Jugador</b><gray> <st>                </st>"
    - ""
    - "         <white>Escribe <aqua>/kit<white>, <aqua>/k <white>o <aqua>/pk<white> para comenzar."
    - ""
    - "<gray>   <st>                                                         "
    - ""

scheduled-broadcast:
  messages:
    - "<white>¡Mira los kits públicos con el comando <aqua>/pk<white>!"
    - "<white>¿Quieres compartir un kit? Usa <aqua>/sharekit \\<slot></aqua><white>."
    - "<white>Escribe <aqua>/kit<white>, <aqua>/k <white>o <aqua>/pk<white> para comenzar."

broadcast-messages:
  player-repaired: "<gray>{player} reparó su equipo</gray>"
  player-healed: "<gray>{player} se curó</gray>"
  player-opened-kit-room: "<gray>{player} abrió la Sala de Kits</gray>"
  player-loaded-private-kit: "<gray>{player} cargó un kit</gray>"
  player-loaded-public-kit: "<gray>{player} cargó un kit público</gray>"
  player-loaded-enderchest: "<gray>{player} cargó un cofre de ender.</gray>"
  player-copied-kit: "<gray>{player} copió un kit</gray>"
  player-copied-ec: "<gray>{player} copió un cofre de ender</gray>"
  player-regeared: "<gray>{player} reequipó</gray>"
  generic: "<gray><aqua>{player}</aqua> realizó una acción.</gray>"

