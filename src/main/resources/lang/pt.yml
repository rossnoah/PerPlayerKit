# PerPlayerKit Language File - Portuguese (Português)
# Uses MiniMessage format: https://docs.advntr.dev/minimessage/format.html
# Placeholders use {name} syntax (e.g. {player}, {slot}).
# To use this file, set `language: pt` in config.yml.

prefix: "<gray>[<aqua>Kits</aqua>]</gray> "

motd:
  message:
    - ""
    - "<gray>   <st>                </st> <aqua><b>Kits Por Jogador</b><gray> <st>                </st>"
    - ""
    - "         <white>Digite <aqua>/kit<white>, <aqua>/k <white>ou <aqua>/pk<white> para começar!"
    - ""
    - "<gray>   <st>                                                         "
    - ""

scheduled-broadcast:
  messages:
    - "<white>Confira os kits públicos com o comando <aqua>/pk<white>!"
    - "<white>Quer compartilhar um kit? Use <aqua>/sharekit \\<slot></aqua><white>."
    - "<white>Digite <aqua>/kit<white>, <aqua>/k <white>ou <aqua>/pk<white> para começar!"

broadcast-messages:
  player-repaired: "<gray>{player} reparou o equipamento</gray>"
  player-healed: "<gray>{player} se curou</gray>"
  player-opened-kit-room: "<gray>{player} abriu a Sala de Kits</gray>"
  player-loaded-private-kit: "<gray>{player} carregou um kit</gray>"
  player-loaded-public-kit: "<gray>{player} carregou um kit público</gray>"
  player-loaded-enderchest: "<gray>{player} carregou um baú do End.</gray>"
  player-copied-kit: "<gray>{player} copiou um kit</gray>"
  player-copied-ec: "<gray>{player} copiou um baú do End</gray>"
  player-regeared: "<gray>{player} se reequipou</gray>"
  generic: "<gray><aqua>{player}</aqua> realizou uma ação.</gray>"

