# PerPlayerKit Language File - English
# Uses MiniMessage format: https://docs.advntr.dev/minimessage/format.html
# Placeholders use {name} syntax (e.g. {player}, {slot}).
# To use this file, set `language: en` in config.yml.

prefix: "<gray>[<aqua>Kits</aqua>]</gray> "

motd:
  message:
    - ""
    - "<gray>   <st>                </st> <aqua><b>Per Player Kits</b><gray> <st>                </st>"
    - ""
    - "         <white>Type <aqua>/kit<white>, <aqua>/k <white>or <aqua>/pk<white> to get started!"
    - ""
    - "<gray>   <st>                                                         "
    - ""

scheduled-broadcast:
  messages:
    - "<white>Check out public kits with the <aqua>/pk<white> command!"
    - "<white>Want to share a kit? Use the <aqua>/sharekit \\<slot></aqua><white> command!"
    - "<white>Type <aqua>/kit<white>, <aqua>/k <white>or <aqua>/pk<white> to get started!"

# Broadcast messages shown when a player performs an action (configured in config.yml messages.*).
broadcast-messages:
  player-repaired: "<gray>{player} repaired their gear</gray>"
  player-healed: "<gray>{player} healed themselves</gray>"
  player-opened-kit-room: "<gray>{player} opened the Kit Room</gray>"
  player-loaded-private-kit: "<gray>{player} loaded a kit</gray>"
  player-loaded-public-kit: "<gray>{player} loaded a public kit</gray>"
  player-loaded-enderchest: "<gray>{player} loaded an ender chest.</gray>"
  player-copied-kit: "<gray>{player} copied a kit</gray>"
  player-copied-ec: "<gray>{player} copied an ender chest</gray>"
  player-regeared: "<gray>{player} regeared</gray>"
  generic: "<gray><aqua>{player}</aqua> performed an action.</gray>"

error:
  disabled-in-world: "<red>Kits are disabled here!</red>"
  unexpected: "<red>Unexpected error occurred, please try again.</red>"
  kit-not-found: "<red>Error, that kit does not exist"
  kit-expired: "<red>Error, kit does not exist or has expired"
  ec-not-found: "<red>Error, that EC does not exist"
  empty-kit: "<red>You can't save an empty kit!"
  empty-ec: "<red>You can't save an empty ender chest!"
  kit-slot-not-found: "<red>Kit {slot} doesn't exist!"
  kit-deletion-failed: "<red>Kit deletion failed!"
  invalid-number: "<red>Select a real number"
  invalid-numbers: "<red>Select real numbers"
  invalid-kit-slot: "<red>Select a valid kit slot"
  missing-kit-code: "<red>Error, you must enter a kit code to copy"
  missing-kit-slot-share: "<red>Error, you must select a kit slot to share"
  missing-ec-slot-share: "<red>Error, you must select an EC slot to share"
  command-cooldown: "<red>Please don't spam the command (5 second cooldown)"
  regear-misconfigured: "<red>This command is not configured correctly, please contact an administrator."
  inventory-full: "<red>Your inventory is full, can't give you a regear shulker!"
  no-kit-loaded: "<red>You have not loaded a kit yet!"
  regear-elytra-blocked: "<red>You cannot regear while using an elytra!"
  regear-combat-cooldown: "<red>You must be out of combat for {seconds} more seconds before regearing!"
  regear-command-cooldown: "<red>You must wait {seconds} seconds before using this command again!"
  missing-arguments: "<red>Missing arguments!"
  invalid-subcommand: "<red>Invalid subcommand!"
  missing-import-type: "<red>Missing import type!"
  invalid-import-type: "<red>Invalid import type!"
  import-files-missing: "<red>Missing files to import"
  invalid-storage-type: "<red>Invalid {role} storage type: {type}"
  storage-same: "<red>Source and destination cannot be the same!"
  migration-failed: "<red>Migration failed: {error}"
  missing-kit-id: "<red>You need to specify a kit id"
  public-kit-not-found: "<red>Public kit {kitid} does not exist"
  add-public-kit-config: "<red>You may need to add a public kit in the config"
  public-kit-save-failed: "<red>Error saving kit {kitid}"
  incorrect-usage: "<red>Incorrect Usage!"
  players-only: "<red>Only players can use this command"
  players-only-inspect: "<red>This command can only be executed by players.</red>"
  invalid-slot-range: "<red>Slot must be a number between {min} and {max}.</red>"
  player-not-found: "<red>Could not find a player with that name or UUID.</red>"
  kit-not-found-display: "<red>Kit not found"
  inspect-kit-missing: "<red>{player} does not have a kit in slot {slot}</red>"
  inspect-ec-missing: "<red>{player} does not have an ender chest in slot {slot}</red>"
  inspect-kit-load-error: "<red>An error occurred while loading kit data. See console for details.</red>"
  inspect-ec-load-error: "<red>An error occurred while loading ender chest data. See console for details.</red>"
  failed-to-update-kit: "<red>Failed to update kit for player {player}!"
  failed-to-update-ec: "<red>Failed to update ender chest for player {player}!"
  invalid-command-label: "<red>Invalid command label."
  prefix-tag: "<red>Error:</red> "

success:
  kit-saved: "<green>Kit {slot} saved!"
  kit-loaded: "<green>Kit {slot} loaded!"
  kit-deleted: "<green>Kit {slot} deleted!"
  kits-swapped: "<green>Kits {slot1} and {slot2} have been swapped!"
  ec-saved: "<green>Enderchest {slot} saved!"
  ec-loaded: "<green>Enderchest {slot} loaded!"
  public-kit-saved: "<green>Public Kit {kitname} saved!"
  public-kit-loaded: "<green>Public Kit loaded!"
  public-kit-saved-admin: "<green>Saved kit {kitid}"
  kitroom-loaded: "<green>Kit Room loaded from SQL"
  kitroom-saved: "<green>Kit Room saved to SQL"
  kitroom-menu-saved: "<green>Kit room menu saved"
  all-repaired: "<green>All items repaired!"
  healed: "<green>You have been healed!"
  shulker-given: "<green>Regear Shulker given!"
  regeared: "<green>Regeared!"
  inventory-cleared: "<green>Inventory cleared"
  admin-kit-deleted: "<green>Kit {slot} deleted for player!"
  admin-ec-deleted: "<green>Enderchest {slot} deleted for player!"
  admin-kit-updated: "<green>Kit {slot} updated for player {player}!"
  admin-ec-updated: "<green>Enderchest {slot} updated for player {player}!"
  migration-completed: "<green>Migration completed successfully!"
  migration-count: "<green>Migrated: {count} entries"
  import-attempted: "<green>Attempted import of KitsX data!"
  import-starting: "<green>Starting import..."

info:
  custom-version-available: "<gray>You can save a custom version of this kit by importing into the kit editor"
  assign-publickit-instruction: "<red>To assign a kit to this publickit use /savepublickit \\<id>"
  share-kit-code: "<green>Use /copykit {code} to copy this kit"
  share-ec-code: "<green>Use /copyEC {code} to copy this ender chest"
  share-code-expiry: "<green>Code expires in 15 minutes"
  import-instructions: "<red>Copy data folder from KitsX into the PerPlayerKit folder"
  migration-starting: "<yellow>Starting migration from {source} to {destination}..."
  migration-large-dataset: "<gray>This may take a while for large datasets. Check console for progress."
  available-storage-types: "<gray>Available storage types: sqlite, mysql, redis, yml"
  update-config-storage: "<yellow>Remember to update your config.yml storage.type to '{type}' and restart the server."
  migration-failed-count: "<yellow>Failed: {count} entries"
  migration-progress: "<gray>{message}"

command:
  perplayerkit-about: "<green>PerPlayerKit is a plugin that allows players to have their own kits."
  deletekit-usage: "<red>Usage: /deletekit \\<slot>"
  swapkit-usage: "<red>Usage: /swapkit \\<slot1> \\<slot2>"
  savepublickit-usage: "<red>Usage: /{command} \\<kitid>"
  perplayerkit-migrate-usage: "<red>Usage: /perplayerkit migrate \\<source> \\<destination>"
  kitroom-usage-hint: "/kitroom \\<load/save>"
  inspect-usage: "<red>Usage: /{command} \\<player|uuid> \\<slot></red>"

update:
  new-version-available: "A new version of PerPlayerKit is available! You are running version {current} and the latest version is {latest}"

about:
  header-start: "==========[About]=========="
  title: "PerPlayerKit"
  author: "Author: {author}"
  license: "License: {license}"
  source-code: "Source Code: {source}"
  version: "Version: {version}"
  build-time: "Build Time: {time}"
  header-end: "==========================="

