  empty-kit: "<red>Nie możesz zapisać pustego zestawu!"
  empty-ec: "<red>Nie możesz zapisać pustej skrzyni Endera!"
  kit-slot-not-found: "<red>Zestaw {slot} nie istnieje!"
  kit-deletion-failed: "<red>Usuwanie zestawu nie powiodło się!"
