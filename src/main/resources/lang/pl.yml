# PerPlayerKit Language File - Polish (Polski)
# Uses MiniMessage format: https://docs.advntr.dev/minimessage/format.html
# Placeholders use {name} syntax (e.g. {player}, {slot}).
# To use this file, set `language: pl` in config.yml.

prefix: "<gray>[<aqua>Zestawy</aqua>]</gray> "

motd:
  message:
    - ""
    - "<gray>   <st>                </st> <aqua><b>Zestawy Per Gracz</b><gray> <st>                </st>"
    - ""
    - "         <white>Wpisz <aqua>/kit<white>, <aqua>/k <white>lub <aqua>/pk<white>, aby zacząć!"
    - ""
    - "<gray>   <st>                                                         "
    - ""

scheduled-broadcast:
  messages:
    - "<white>Sprawdź zestawy publiczne komendą <aqua>/pk<white>!"
    - "<white>Chcesz udostępnić zestaw? Użyj <aqua>/sharekit \\<slot></aqua><white>."
    - "<white>Wpisz <aqua>/kit<white>, <aqua>/k <white>lub <aqua>/pk<white>, aby zacząć!"

broadcast-messages:
  player-repaired: "<gray>{player} naprawił swój ekwipunek</gray>"
  player-healed: "<gray>{player} uleczył się</gray>"
  player-opened-kit-room: "<gray>{player} otworzył pokój zestawów</gray>"
  player-loaded-private-kit: "<gray>{player} załadował zestaw</gray>"
  player-loaded-public-kit: "<gray>{player} załadował publiczny zestaw</gray>"
  player-loaded-enderchest: "<gray>{player} załadował skrzynię Endera.</gray>"
  player-copied-kit: "<gray>{player} skopiował zestaw</gray>"
  player-copied-ec: "<gray>{player} skopiował skrzynię Endera</gray>"
  player-regeared: "<gray>{player} ponownie się wyposażył</gray>"
  generic: "<gray><aqua>{player}</aqua> wykonał akcję.</gray>"

error:
