# PerPlayerKit Language File - Romanian (Română)
# Uses MiniMessage format: https://docs.advntr.dev/minimessage/format.html
# Placeholders use {name} syntax (e.g. {player}, {slot}).
# To use this file, set `language: ro` in config.yml.

prefix: "<gray>[<aqua>Kituri</aqua>]</gray> "

motd:
  message:
    - ""
    - "<gray>   <st>                </st> <aqua><b>Kituri Per Jucător</b><gray> <st>                </st>"
    - ""
    - "         <white>Scrie <aqua>/kit<white>, <aqua>/k <white>sau <aqua>/pk<white> pentru a începe!"
    - ""
    - "<gray>   <st>                                                         "
    - ""

scheduled-broadcast:
  messages:
    - "<white>Verifică kiturile publice cu comanda <aqua>/pk<white>!"
    - "<white>Vrei să partajezi un kit? Folosește <aqua>/sharekit <slot><white>."
    - "<white>Scrie <aqua>/kit<white>, <aqua>/k <white>sau <aqua>/pk<white> pentru a începe!"

broadcast-messages:
  player-repaired: "<gray>{player} și-a reparat echipamentul</gray>"
  player-healed: "<gray>{player} s-a vindecat</gray>"
  player-opened-kit-room: "<gray>{player} a deschis camera kiturilor</gray>"
  player-loaded-private-kit: "<gray>{player} a încărcat un kit</gray>"
  player-loaded-public-kit: "<gray>{player} a încărcat un kit public</gray>"
  player-loaded-enderchest: "<gray>{player} a încărcat un cufăr Ender.</gray>"
  player-copied-kit: "<gray>{player} a copiat un kit</gray>"
  player-copied-ec: "<gray>{player} a copiat un cufăr Ender</gray>"
  player-regeared: "<gray>{player} s-a reechipat</gray>"
  generic: "<gray><aqua>{player}</aqua> a efectuat o acțiune.</gray>"

