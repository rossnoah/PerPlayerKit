# PerPlayerKit Language File - German (Deutsch)
# Uses MiniMessage format: https://docs.advntr.dev/minimessage/format.html
# Placeholders use {name} syntax (e.g. {player}, {slot}).
# To use this file, set `language: de` in config.yml.

prefix: "<gray>[<aqua>Kits</aqua>]</gray> "

motd:
  message:
    - ""
    - "<gray>   <st>                </st> <aqua><b>Per-Spieler-Kits</b><gray> <st>                </st>"
    - ""
    - "         <white>Tippe <aqua>/kit<white>, <aqua>/k <white>oder <aqua>/pk<white>, um zu beginnen!"
    - ""
    - "<gray>   <st>                                                         "
    - ""

scheduled-broadcast:
  messages:
    - "<white>Schau dir öffentliche Kits mit dem Befehl <aqua>/pk<white> an!"
    - "<white>Möchtest du ein Kit teilen? Verwende <aqua>/sharekit \\<slot></aqua><white>."
    - "<white>Tippe <aqua>/kit<white>, <aqua>/k <white>oder <aqua>/pk<white>, um zu beginnen!"

broadcast-messages:
  player-repaired: "<gray>{player} hat seine Ausrüstung repariert</gray>"
  player-healed: "<gray>{player} hat sich geheilt</gray>"
  player-opened-kit-room: "<gray>{player} hat den Kit-Raum geöffnet</gray>"
  player-loaded-private-kit: "<gray>{player} hat ein Kit geladen</gray>"
  player-loaded-public-kit: "<gray>{player} hat ein öffentliches Kit geladen</gray>"
  player-loaded-enderchest: "<gray>{player} hat eine Endertruhe geladen.</gray>"
  player-copied-kit: "<gray>{player} hat ein Kit kopiert</gray>"
  player-copied-ec: "<gray>{player} hat eine Endertruhe kopiert</gray>"
  player-regeared: "<gray>{player} hat sich neu ausgerüstet</gray>"
  generic: "<gray><aqua>{player}</aqua> hat eine Aktion ausgeführt.</gray>"

