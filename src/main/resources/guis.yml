  enderchest-editor:
    rows: 6
    title: "%primary_color%Enderchest: %slot%"
    elements:
      fill:
        order: 0
        type: fill
        slots: "0-53"
        item:
          material: "@glass"
          name: " "
      data:
        order: 10
        type: component
        component: enderchest-data
        slots: "9-35"
        editable: true
      import:
        order: 30
