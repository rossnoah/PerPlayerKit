          name: "<gray><b>HELMET</b></gray>"
      offhand:
        order: 24
        type: static
        slots: "49"
        item:
          material: SHIELD
          name: "<gray><b>OFFHAND</b></gray>"
      load:
        order: 30
        type: static
        slots: "52"
        item:
          material: APPLE
          name: "<green><b>LOAD KIT</b></green>"
        actions:
          any:
            - type: load-public-kit
              public-kit-id: "%public_kit_id%"
              close: true
      back:
        order: 31
        type: static
        slots: "53"
        item:
          material: OAK_DOOR
          name: "<red><b>BACK</b></red>"
        actions:
          any:
            - type: open-gui
              gui: public-kit-menu

  kit-room:
    rows: 6
    title: "%primary_color%Kit Room"
    redraw: true
    elements:
      fill:
        order: 0
        type: fill
        slots: "0-53"
        item:
          material: "@glass"
          name: " "
      data:
        order: 10
        type: component
        component: kit-room-data
        slots: "0-44"
        editable: true
      refill:
        order: 20
        type: static
        slots: "45"
        item:
          material: BEACON
          name: "<dark_aqua><b>REFILL</b></dark_aqua>"
        actions:
          any:
            - type: open-gui
              gui: kit-room
              context:
                page: "%page%"
                page_display: "%page_display%"
      categories:
        order: 30
        type: component
        component: kit-room-category-buttons
        slots: "47-51"
        start-page: 0
        variants:
          default:
            item:
              material: "@kitroom_material"
              name: "<reset>%kitroom_name%"
              hide-flags: true
            actions:
              any:
                - type: open-gui
                  gui: kit-room
                  context:
                    page: "%page%"
                    page_display: "%page_display%"
          active:
            item:
              material: "@kitroom_material"
              name: "<reset>%kitroom_name%"
              hide-flags: true
              glow: true
            actions:
              any:
                - type: open-gui
                  gui: kit-room
                  context:
                    page: "%page%"
                    page_display: "%page_display%"
      control:
        order: 40
        type: component
        component: kit-room-control
        slots: "53"
        variants:
          viewer:
            item:
              material: OAK_DOOR
              name: "<red><b>BACK</b></red>"
            actions:
              any:
                - type: open-gui
                  gui: main-menu
          editor:
            item:
              material: BARRIER
              name: "<red><b>EDIT MENU</b></red>"
              lore:
                - "<red>SHIFT RIGHT CLICK TO SAVE</red>"
            actions:
              shift_right:
                - type: save-kit-room-page
                  success-message: "<green>Saved kitroom page: %page_display%</green>"

  view-only-enderchest:
    rows: 5
    title: "%primary_color%View Only Enderchest"
    elements:
      fill:
        order: 0
        type: fill
        slots: "0-44"
        item:
          material: "@glass"
          name: " "
      data:
        order: 10
        type: component
        component: player-enderchest-data
        slots: "9-35"
