            - type: delete-player-enderchest
              slot: "%slot%"
              close: true
              skip-close-save: true
              success-message: "<green>Enderchest %slot% deleted for player!</green>"
      close:
        order: 31
        type: static
        slots: "53"
        item:
          material: OAK_DOOR
          name: "<red><b>CLOSE</b></red>"
        actions:
          any:
            - type: close

  public-kit-menu:
    rows: 6
    title: "%primary_color%Public Kit Room"
    redraw: true
    elements:
      fill:
        order: 0
        type: fill
        slots: "0-53"
        item:
          material: "@glass"
          name: " "
      coming-soon:
        order: 5
        type: static
        slots: "18-35"
        item:
          material: BOOK
          name: "<gray><b>MORE KITS COMING SOON</b></gray>"
      list:
        order: 10
        type: component
        component: public-kit-list
        slots: "18-35"
        variants:
          assigned:
            item:
              material: "@public_kit_icon"
              name: "<reset>%public_kit_name%"
            actions:
              left:
                - type: load-public-kit
                  public-kit-id: "%public_kit_id%"
                  close: true
              right:
                - type: open-gui
                  gui: public-kit-viewer
                  context:
                    public_kit_id: "%public_kit_id%"
                    public_kit_name: "%public_kit_name%"
                    public_kit_icon: "%public_kit_icon%"
          unassigned:
            item:
              material: "@public_kit_icon"
              name: "<reset>%public_kit_name% <red><b>[UNASSIGNED]</b></red>"
              lore:
                - "<gray>● Admins have not yet setup this kit yet</gray>"
          admin_assigned:
            item:
              material: "@public_kit_icon"
              name: "<reset>%public_kit_name%"
              lore:
                - "<gray>● [ADMIN] Shift click to edit</gray>"
            actions:
              shift:
                - type: open-gui
                  gui: public-kit-editor
                  context:
                    public_kit_id: "%public_kit_id%"
                    public_kit_name: "%public_kit_name%"
                    public_kit_icon: "%public_kit_icon%"
              left:
                - type: load-public-kit
                  public-kit-id: "%public_kit_id%"
                  close: true
              right:
                - type: open-gui
                  gui: public-kit-viewer
                  context:
                    public_kit_id: "%public_kit_id%"
                    public_kit_name: "%public_kit_name%"
                    public_kit_icon: "%public_kit_icon%"
          admin_unassigned:
            item:
              material: "@public_kit_icon"
              name: "<reset>%public_kit_name% <red><b>[UNASSIGNED]</b></red>"
              lore:
                - "<gray>● Admins have not yet setup this kit yet</gray>"
                - "<gray>● [ADMIN] Shift click to edit</gray>"
            actions:
              shift:
                - type: open-gui
                  gui: public-kit-editor
                  context:
                    public_kit_id: "%public_kit_id%"
                    public_kit_name: "%public_kit_name%"
                    public_kit_icon: "%public_kit_icon%"
      back:
        order: 20
        type: static
        slots: "53"
        item:
          material: OAK_DOOR
          name: "<red><b>BACK</b></red>"
        actions:
          any:
            - type: open-gui
              gui: main-menu

  public-kit-viewer:
    rows: 6
    title: "%primary_color%Viewing Public Kit: %public_kit_id%"
    redraw: true
    elements:
      fill:
        order: 0
        type: fill
        slots: "0-53"
        item:
          material: "@glass"
          name: " "
      data:
        order: 10
