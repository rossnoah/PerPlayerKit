            - type: open-gui
              gui: main-menu

  inspect-kit:
    rows: 6
    title: "%primary_color%Inspecting %target_name%'s kit %slot%"
    elements:
      fill:
        order: 0
        type: fill
        slots: "0-53"
        item:
          material: "@glass"
          name: " "
      data:
        order: 10
        type: component
        component: kit-data
        slots: "0-40"
      admin-data:
        order: 11
        type: component
        component: kit-data
        permission: perplayerkit.admin
        slots: "0-40"
        editable: true
      boots:
        order: 20
        type: static
        slots: "45"
        item:
          material: CHAINMAIL_BOOTS
          name: "<gray><b>BOOTS</b></gray>"
      leggings:
        order: 21
        type: static
        slots: "46"
        item:
          material: CHAINMAIL_LEGGINGS
          name: "<gray><b>LEGGINGS</b></gray>"
      chestplate:
        order: 22
        type: static
        slots: "47"
        item:
          material: CHAINMAIL_CHESTPLATE
          name: "<gray><b>CHESTPLATE</b></gray>"
      helmet:
        order: 23
        type: static
        slots: "48"
        item:
          material: CHAINMAIL_HELMET
          name: "<gray><b>HELMET</b></gray>"
      offhand:
        order: 24
        type: static
        slots: "49"
        item:
          material: SHIELD
          name: "<gray><b>OFFHAND</b></gray>"
      delete:
        order: 30
        type: static
        permission: perplayerkit.admin
        slots: "52"
        item:
          material: BARRIER
          name: "<red><b>CLEAR KIT</b></red>"
          lore:
            - "<gray>● Shift click to delete kit</gray>"
        actions:
          shift:
            - type: delete-player-kit
              slot: "%slot%"
              close: true
              skip-close-save: true
              success-message: "<green>Kit %slot% deleted for player!</green>"
      close:
        order: 31
        type: static
        slots: "53"
        item:
          material: OAK_DOOR
          name: "<red><b>CLOSE</b></red>"
        actions:
          any:
            - type: close

  inspect-enderchest:
    rows: 6
    title: "%primary_color%Inspecting %target_name%'s enderchest %slot%"
    elements:
      fill:
        order: 0
        type: fill
        slots: "0-53"
        item:
          material: "@glass"
          name: " "
      data:
        order: 10
        type: component
        component: enderchest-data
        slots: "9-35"
      admin-data:
        order: 11
        type: component
        component: enderchest-data
        permission: perplayerkit.admin
        slots: "9-35"
        editable: true
      delete:
        order: 30
        type: static
        permission: perplayerkit.admin
        slots: "52"
        item:
          material: BARRIER
          name: "<red><b>CLEAR ENDERCHEST</b></red>"
          lore:
            - "<gray>● Shift click to delete enderchest</gray>"
        actions:
